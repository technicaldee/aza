<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AZA Pay - Fast & Secure Payments</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="/assets/css/styles.css" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#2e0052",
              "primary-container": "#4b0082",
              secondary: "#0059bb",
              "secondary-container": "#0070ea",
              "primary-fixed": "#f0dbff",
              "secondary-fixed": "#d8e2ff",
              "surface-container-low": "#f3f4f5",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#e7e8e9",
              outline: "#7d7483",
              "outline-variant": "#cec3d3",
              "on-surface": "#191c1d"
            },
            fontFamily: {
              headline: ["Ubuntu", "sans-serif"],
              body: ["Ubuntu", "sans-serif"]
            }
          }
        }
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
    <nav class="fixed top-0 z-50 w-full bg-white/80 shadow-sm backdrop-blur-xl">
      <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-8">
        <div class="text-2xl font-black tracking-tighter text-indigo-950 font-headline">
          <img alt="AZA Logo" class="h-10" src="/logo.png" />
        </div>
        <a class="rounded bg-gradient-to-br from-primary to-primary-container px-6 py-2.5 font-bold text-white shadow-lg shadow-primary/20 transition-all duration-300 hover:opacity-80" href="/signup.html">
          Become a Vendor
        </a>
      </div>
    </nav>

    <main id="pay-shell" class="flex flex-grow flex-col items-center px-4 pb-12 pt-28">
      <div class="w-full max-w-md space-y-8">
        <div id="error-card" class="hidden rounded-xl border border-red-200 bg-red-50 p-4 text-sm font-semibold text-red-700"></div>

        <section class="flex flex-col items-center space-y-4 rounded-xl bg-surface-container-low p-6 text-center">
          <div class="relative">
            <div class="flex h-20 w-20 items-center justify-center overflow-hidden rounded-full bg-primary-fixed text-primary">
              <span class="material-symbols-outlined text-4xl">storefront</span>
            </div>
            <div class="absolute -bottom-1 -right-1 rounded-full border-4 border-surface-container-low bg-secondary p-1 text-white">
              <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1">verified</span>
            </div>
          </div>
          <div>
            <h2 id="merchant-name" class="text-xl font-bold tracking-tight text-on-surface font-headline">Loading merchant...</h2>
            <div class="mt-1 flex items-center justify-center gap-1 text-sm font-medium text-secondary">
              <span class="material-symbols-outlined text-base">location_on</span>
              <span id="merchant-location">Fetching location</span>
            </div>
            <p id="merchant-category" class="mt-2 text-sm text-slate-500"></p>
          </div>
        </section>

        <section class="rounded-xl border border-outline-variant/15 bg-surface-container-lowest p-8 shadow-sm">
          <div class="space-y-6">
            <div class="space-y-2">
              <label class="text-sm font-bold uppercase tracking-widest text-outline font-headline">Enter Amount</label>
              <div class="flex items-center gap-3 rounded-lg bg-surface-container-high p-4">
                <span id="currency-symbol" class="text-2xl font-black text-primary">₦</span>
                <input id="amount-input" class="w-full border-none bg-transparent p-0 text-3xl font-black text-on-surface focus:ring-0" placeholder="0.00" type="number" value="500" />
              </div>
            </div>

            <div class="space-y-2">
              <label class="text-sm font-bold uppercase tracking-widest text-outline font-headline">Currency</label>
              <select
                id="currency-select"
                class="w-full rounded-lg border border-outline-variant/30 bg-white px-4 py-4 font-semibold text-on-surface focus:border-primary focus:ring-primary/20"
              >
                <option value="566">Nigerian Naira (NGN)</option>
              </select>
              <p class="text-xs text-slate-500">Default is Naira. You can switch to any supported Interswitch currency.</p>
            </div>

            <div class="space-y-2">
              <label class="text-sm font-bold uppercase tracking-widest text-outline font-headline">Your Name</label>
              <input id="payer-name" class="w-full rounded-lg border border-outline-variant/30 bg-white px-4 py-4 font-semibold text-on-surface focus:border-primary focus:ring-primary/20" placeholder="Customer name" type="text" />
            </div>

            <div class="space-y-2">
              <label class="text-sm font-bold uppercase tracking-widest text-outline font-headline">Your Email</label>
              <input id="payer-email" class="w-full rounded-lg border border-outline-variant/30 bg-white px-4 py-4 font-semibold text-on-surface focus:border-primary focus:ring-primary/20" placeholder="customer@email.com" type="email" />
            </div>

            
            <button id="submit-payment" class="w-full rounded-lg bg-secondary-container py-4 text-lg font-black text-white shadow-xl transition-all active:scale-[0.98]">
              Pay Securely with Quickteller
            </button>
          </div>
        </section>


        <section id="success-card" class="hidden grid grid-cols-2 gap-4">
          <div class="col-span-2 flex flex-col items-center space-y-4 rounded-2xl border border-green-100 bg-green-50 p-8 text-center">
            <div class="flex h-16 w-16 items-center justify-center rounded-full bg-green-500 text-white shadow-lg shadow-green-200">
              <span class="material-symbols-outlined text-3xl font-bold">check</span>
            </div>
            <div>
              <h3 class="text-2xl font-black tracking-tighter text-green-900 font-headline">Payment Successful</h3>
              <p id="success-amount" class="font-medium text-green-700">₦0.00</p>
            </div>
          </div>
          <div class="flex flex-col items-center rounded-xl border border-outline-variant/15 bg-white p-4">
            <p class="text-[10px] font-bold uppercase tracking-widest text-outline">Time</p>
            <p id="success-time" class="font-bold text-on-surface">--</p>
          </div>
        </section>
      </div>
    </main>

    <footer class="w-full border-t border-slate-200 bg-slate-50 py-12">
      <div class="mx-auto grid max-w-7xl grid-cols-1 items-center gap-8 px-8 md:grid-cols-2">
        <div class="space-y-4">
          <div>
            <img alt="AZA Logo" class="h-8" src="/logo.png" />
          </div>
          <p class="text-sm leading-relaxed text-slate-500">© 2026 AZA. Powered by Interswitch</p>
        </div>
        <div class="flex flex-wrap gap-6 md:justify-end">
          <a class="text-sm text-slate-500 transition-colors hover:text-indigo-500" href="/">Home</a>
          <a class="text-sm text-slate-500 transition-colors hover:text-indigo-500" href="/signup.html">Become a Vendor</a>
        </div>
      </div>
    </footer>

    <script type="module" src="/assets/js/pay.js"></script>
  </body>
</html>
